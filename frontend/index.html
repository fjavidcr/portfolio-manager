<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Prueba Login Google</title>
</head>

<body>
    <h1>Portfolio Manager - Login</h1>
    <button id="btnLogin">Iniciar sesión con Google</button>
    <button id="btnLogout" style="display:none;">Cerrar sesión</button>

    <h3 id="status">Estado: Desconectado</h3>
    <pre id="userData"></pre>

    <script type="module">
        // Importar funciones necesarias del CDN de Firebase
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged }
            from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc }
            from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // --- PEGA TU CONFIGURACIÓN AQUÍ ---
        const firebaseConfig = {
            apiKey: "TU_API_KEY",
            authDomain: "portfolio-manager-fj.firebaseapp.com",
            projectId: "portfolio-manager-fj",
            storageBucket: "...",
            messagingSenderId: "...",
            appId: "..."
        };
        // ----------------------------------

        // Inicializar
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        const btnLogin = document.getElementById('btnLogin');
        const btnLogout = document.getElementById('btnLogout');
        const status = document.getElementById('status');
        const userData = document.getElementById('userData');

        // 1. Manejar Click de Login
        btnLogin.addEventListener('click', async () => {
            try {
                const result = await signInWithPopup(auth, provider);
                const user = result.user;
                console.log("Usuario logueado:", user);
            } catch (error) {
                console.error("Error login:", error);
                status.innerText = "Error: " + error.message;
            }
        });

        // 2. Manejar Logout
        btnLogout.addEventListener('click', () => {
            signOut(auth);
        });

        // 3. Escuchar cambios de estado (Persistencia)
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                // Usuario conectado
                btnLogin.style.display = 'none';
                btnLogout.style.display = 'block';
                status.innerText = `Hola, ${user.displayName} (${user.email})`;

                // INTENTO DE LEER LA BASE DE DATOS
                // Nota: Esto fallará si tu UID de Google no coincide con el de 'users' que creamos a mano.
                // Pero sirve para probar que la auth funciona.
                status.innerText += "\n\nIntentando leer Firestore...";

                try {
                    const docRef = doc(db, "users", user.uid, "portfolio", "Bitcoin");
                    const docSnap = await getDoc(docRef);

                    if (docSnap.exists()) {
                        userData.innerText = "Dato de Bitcoin: " + JSON.stringify(docSnap.data(), null, 2);
                    } else {
                        userData.innerText = "Login correcto, pero no encontré datos para este UID: " + user.uid;
                        console.log("Tu UID real es:", user.uid);
                        // TIP: Copia este UID y renombra tu documento en Firestore para que coincidan
                    }
                } catch (e) {
                    userData.innerText = "Error leyendo DB: " + e.message;
                }

            } else {
                // Usuario desconectado
                btnLogin.style.display = 'block';
                btnLogout.style.display = 'none';
                status.innerText = "Estado: Desconectado";
                userData.innerText = "";
            }
        });
    </script>
</body>

</html>
