name: CI Checks

on:
  workflow_call:

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.14'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check Formatting (Prettier)
        run: npm run format:check

      - name: Run Linter (ESLint)
        run: npm run lint

      - name: Build Project (Astro)
        run: npm run build
